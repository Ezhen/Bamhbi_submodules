site_name: "NECCTON — BAMHBI (FABM submodules)"
repo_name: "neccton-bamhbi-fabm"
theme:
  name: material
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - content.code.copy
markdown_extensions:
  - admonition
  - toc:
      permalink: true
nav:
  - Home: index.md
  - Model overview:
      - Scope & conventions: overview.md
      - Tracers: reference/tracers.md
      - Diagnostics: reference/diagnostics.md
      - Parameters: reference/parameters.md
  - Process blocks:
      - Diatoms: process/diatoms.md
      - Emiliana: process/emiliana.md
      - Flagellates: process/flagellates.md
      - Microzooplankton: process/microzoo.md
      - Mesozooplankton: process/mesozoo.md
      - Bacteria: process/bacteria.md
      - DOM/POM: process/dom.md
      - Chemistry: process/chemical.md
      - Gelatinous: process/gelatinous.md
      - Noctiluca: process/noctiluca.md
  - Build & run:
      - Compiling with FABM: build/compiling.md
      - Using the example YAMLs: build/configuration.md
